        highlights:
          - "Analyzed government and consumer survey data in Stata to evaluate policy initiatives and produce executive-level visualizations and reports."
          - "Designed survey instruments in Qualtrics; assisted with a methodology paper on Random Forest imputation for structural changes in longitudinal survey design, presented at an AAPOR-affiliated venue."

    Publications:
      - title: "Coverage Substitution After Job Loss: How the ACA Altered Post-Displacement Insurance Trajectories"
        authors:
          - Sing-Hao Ku
        publisher: M.A. Thesis, New York University (Advisor: Prof. Gustavo Pereira) — Highest Distinction in Cohort
        releaseDate: 2026-05
        url: /assets/pdf/Ku_Coverage_Substitution_ACA.pdf
        summary: Propensity-score-matched event-study difference-in-differences on a person-month panel of 5.9 million observations (MEPS 2004-2018), with a two-part hurdle decomposition of premium burden and latent class analysis of pre-displacement job profiles. Found the ACA absorbed roughly one-quarter of the two-month coverage loss and one-third of the four-month loss, with gains concentrated in a high-coverage Finance and Professional class.

    Projects:
      - name: Determinants of Household Debt Across OECD Economies
        summary: "Messy Data and Machine Learning\" final project (Technical Lead). Applied Random Forest, LASSO, and multinomial logistic regression; Random Forest outperformed multinomial logistic regression (90.5% vs. 76.9% accuracy), identifying credit market accessibility and income inequality as dominant predictors of household debt levels."
        start_date: 2025-09
        end_date: 2025-12

      - name: "Medicaid Expansion and Out-of-Pocket Costs: A Double Machine Learning Approach"
        summary: "\"Machine Learning for Economics\" term paper. Applied a PLIV estimator in R using DML (Random Forest, LASSO, XGBoost with cross-fitting) to estimate the causal effect of Medicaid expansion on medical out-of-pocket spending."
        start_date: 2025-02
        end_date: 2025-05

      - name: Assessing the Financial and Coverage Effects of Medicaid Expansion
        summary: "\"Applied Statistics and Econometrics\" final project (Group Project Lead, Technical). Led all coding, data cleaning, and empirical strategy; estimated survey-weighted DiD and event-study models on CPS ASEC microdata; combined SUR models to test joint significance across coverage, financial protection, and health outcomes."
        start_date: 2025-02
        end_date: 2025-05

      - name: LLM-Based Author Disambiguation on Eugenics-Movement Literature
        summary: "\"Empirical Research Methods\" project. Cleaned and standardized large-scale bibliometric records on the eugenics movement (1880-1945); built an R pipeline calling the Gemini API to disambiguate author and source records at scale."
        start_date: 2025-09
        end_date: 2025-12

