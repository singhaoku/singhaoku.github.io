        highlights:
          - "Built an end-to-end Stata pipeline integrating 21 years of MEPS Full-Year Consolidated, Jobs, and Person-Round files into a person-month panel of 301,000 individuals."
          - "Conducted imputation and data wrangling to support causal-inference analyses of healthcare policy and labor outcomes."

