    Working Papers:
      - bullet: '**Coverage Substitution After Job Loss: How the ACA Altered Post-Displacement Insurance Trajectories** — *M.A. Thesis, New York University (Advisor: Prof. Gustavo Pereira) — Highest Distinction in Cohort*, 2026. Propensity-score-matched event-study difference-in-differences on a person-month panel of 5.9 million observations (MEPS 2004-2018), with a two-part hurdle decomposition of premium burden and latent class analysis of pre-displacement job profiles. Found the ACA absorbed roughly one-quarter of the two-month coverage loss and one-third of the four-month loss, with gains concentrated in a high-coverage Finance and Professional class.'

      - bullet: '**Medicaid Expansion and Out-of-Pocket Costs: Causal Evidence from Double Machine Learning** — *Term paper, "Machine Learning for Economics," New York University*, 2025. Double/Debiased Machine Learning instrumental-variables estimator (Random Forest, LASSO, XGBoost) to estimate the causal effect of ACA Medicaid expansion on medical out-of-pocket spending, using quasi-experimental variation between expansion and non-expansion states (CPS ASEC, 2011-2017, ~786,000 observations).'

      - bullet: '**Nudging in Public Policy: A Review of Empirical Studies** — *Literature review, New York University (Advisor: Prof. Mario Rizzo)*, 2025. Reviews libertarian paternalism and nudge theory, then evaluates List et al. (2023) on nudges vs. taxes/subsidies and Handel (2011) on adverse selection and switching costs in health insurance, concluding with "nudge plus," "budge," and "boost" as extensions to the classic nudge framework.'

